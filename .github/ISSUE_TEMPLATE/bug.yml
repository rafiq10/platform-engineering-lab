name: Bug
description: Report a defect.
title: "[Bug]: "
labels:
  - kind:bug
  - priority:high

body:
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happens?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Describe how to reproduce the problem.
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Operating system, Go version, browser, etc.

  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: How serious is the issue?

  - type: textarea
    id: possible
    attributes:
      label: Possible Cause
      description: Optional analysis or suspected root cause.

  - type: textarea
    id: references
    attributes:
      label: References
      description: Logs, screenshots, related issues or PRs.