name: Feature
description: Propose a new feature or engineering improvement.
title: "[Feature]: "
labels:
  - kind:feature
  - priority:medium

body:
  - type: textarea
    id: objective
    attributes:
      label: Objective
      description: What should be achieved?
      placeholder: Describe the objective of this feature.
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this feature needed?
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: Define the conditions that must be satisfied.
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true

  - type: textarea
    id: implementation
    attributes:
      label: Implementation Notes
      description: Optional implementation ideas or constraints.

  - type: textarea
    id: learning
    attributes:
      label: Learning Outcomes
      description: What engineering concepts should be learned while implementing this feature?

  - type: textarea
    id: references
    attributes:
      label: References
      description: Links to documentation, ADRs, RFCs, blog posts, etc.